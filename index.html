<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Notebook (OCR & Cabinet Tracker with Delete)</title>
    <!-- ดึงไลบรารีสแกนตัวอักษร -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- ดึงไลบรารีสำหรับสร้างไฟล์ Excel บนหน้าเว็บ -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fb;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 { text-align: center; color: #2c3e50; margin-top: 0; }
        .section {
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .section-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #4a5568;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .camera-box {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        #video { width: 100%; display: block; }
        .scan-region {
            position: absolute;
            top: 42.5%;
            left: 15%;
            width: 70%;
            height: 15%;
            border: 3px dashed #3182ce;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            box-sizing: border-box;
        }
        .scan-region::after {
            content: "เล็งตัวอักษรให้อยู่ในกรอบนี้";
            position: absolute;
            bottom: -25px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 2px 0;
        }
        .status-text {
            text-align: center;
            font-size: 14px;
            color: #718096;
            margin: 8px 0;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            font-weight: bold;
        }
        input {
            text-align: center;
            color: #2b6cb0;
            font-size: 18px;
        }
        select {
            color: #4a5568;
            background-color: #fff;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #4a5568;
            font-size: 14px;
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .btn-scan { background-color: #3182ce; color: white; width: 100%; margin-top: 10px; }
        .btn-checkout { background-color: #e53e3e; color: white; }
        .btn-checkin { background-color: #38a169; color: white; }
        .btn-excel { 
            background-color: #107c41; 
            color: white; 
            font-size: 12px; 
            padding: 6px 12px; 
            border-radius: 4px;
        }
        .btn-delete {
            background-color: #fff;
            border: 1px solid #e53e3e;
            color: #e53e3e;
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 4px;
            font-weight: normal;
        }
        .btn-delete:hover {
            background-color: #fff5f5;
        }
        
        .log-list { max-height: 280px; overflow-y: auto; margin-top: 10px; }
        .log-item {
            padding: 10px 12px;
            border-bottom: 1px solid #edf2f7;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-left-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .log-info {
            display: flex;
            flex-direction: column;
        }
        .time-info {
            color: #718096;
            font-size: 11px;
            margin-top: 4px;
            line-height: 1.4;
        }
        .cabinet-badge {
            background-color: #edf2f7;
            color: #4a5568;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
            margin-top: 4px;
            border: 1px solid #cbd5e0;
            width: fit-content;
        }
        .status-out { background-color: #fed7d7; color: #9b2c2c; padding: 4px 8px; border-radius: 4px; font-weight: bold; text-align: center; min-width: 60px; }
        .status-in { background-color: #c6f6d5; color: #22543d; padding: 4px 8px; border-radius: 4px; font-weight: bold; text-align: center; min-width: 60px; }
        .log-right-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 Asset Notebook + ระบบจัดการประวัติ</h2>
    
    <!-- 1. ส่วนกล้องสแกน -->
    <div class="section">
        <div class="section-title">📷 ส่องกล้องไปที่รหัสทรัพย์สิน</div>
        <div class="camera-box">
            <video id="video" autoplay playsinline></video>
            <div class="scan-region"></div>
        </div>
        <button class="btn-scan" onclick="captureAndRecognize()">📸 กดเพื่อสแกนอ่านคำ</button>
        <div class="status-text" id="status">สถานะกล้อง: พร้อมใช้งาน</div>
    </div>

    <!-- 2. ฟอร์มและปุ่มกดทำรายการ -->
    <div class="section">
        <div class="section-title">🔄 ระบุรายละเอียดข้อมูล</div>
        
        <div class="form-group">
            <label for="assetId">รหัสทรัพย์สินที่สแกนได้</label>
            <input type="text" id="assetId" placeholder="ตัวอักษรจะโผล่ที่นี่">
            <input type="hidden" id="lastScanTime" value="">
        </div>

        <div class="form-group">
            <label for="cabinetLocation">📦 ตู้เก็บของที่ทำรายการ</label>
            <select id="cabinetLocation">
                <option value="ตู้ A">ตู้ A</option>
                <option value="ตู้ B">ตู้ B</option>
                <option value="ตู้ C">ตู้ C</option>
                <option value="ตู้ D">ตู้ D</option>
                <option value="โต๊ะทำงานส่วนตัว">โต๊ะทำงานส่วนตัว</option>
            </select>
        </div>
        
        <div class="btn-group">
            <button class="btn-checkout" onclick="handleAction('หยิบออก')">📤 หยิบออก</button>
            <button class="btn-checkin" onclick="handleAction('เก็บคืน')">📥 เก็บคืน</button>
        </div>
    </div>

    <!-- 3. ส่วนประวัติและปุ่มโหลด Excel -->
    <div class="section">
        <div class="section-title">
            <span>📜 ประวัติล่าสุด</span>
            <button class="btn-excel" onclick="exportToExcel()">🟢 ดาวน์โหลดเป็น Excel</button>
        </div>
        <div class="log-list" id="logList"></div>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const assetInput = document.getElementById('assetId');
    const scanTimeInput = document.getElementById('lastScanTime');
    const cabinetSelect = document.getElementById('cabinetLocation');

    // เปิดกล้องหลังอัตโนมัติ
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { statusDiv.innerText = "เปิดกล้องไม่ได้: " + err.message; });

    function getFormattedDateTime() {
        const now = new Date();
        return now.toLocaleDateString('th-TH') + ' ' + now.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
    }

    // ฟังก์ชันจับภาพและสแกนเฉพาะกึ่งกลางภาพกล้องจริง
    async function captureAndRecognize() {
        statusDiv.innerText = "⏳ กำลังอ่านตัวอักษร...";
        assetInput.value = "";
        scanTimeInput.value = "";
        
        const ctx = canvas.getContext('2d');
        const videoWidth = video.videoWidth;
        const videoHeight = video.videoHeight;
        
        const cropWidth = 500;
        const cropHeight = 120;
        const cropLeft = (videoWidth - cropWidth) / 2;
        const cropTop = (videoHeight - cropHeight) / 2;
        
        canvas.width = cropWidth;
        canvas.height = cropHeight;
        ctx.drawImage(video, cropLeft, cropTop, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);

        try {
            const result = await Tesseract.recognize(canvas, 'eng');
            let cleanText = result.data.text.trim().replace(/[^a-zA-Z0-9-_ ]/g, '');
            if (cleanText) {
                assetInput.value = cleanText;
                scanTimeInput.value = getFormattedDateTime();
                statusDiv.innerText = "✅ อ่านสำเร็จ ณ เวลา " + scanTimeInput.value.split(' ')[1];
            } else {
                statusDiv.innerText = "❌ ไม่พบตัวอักษรในกรอบ ลองขยับกล้องอีกทีครับ";
            }
        } catch (error) {
            statusDiv.innerText = "เกิดข้อผิดพลาดในการอ่าน";
        }
    }

    // --- ระบบจัดเก็บข้อมูลและส่งออก Excel ---
    let logs = JSON.parse(localStorage.getItem('myAssetLogs')) || [];
    renderLogs();

    function handleAction(actionType) {
        const assetId = assetInput.value.trim();
        if (!assetId) {
            alert('กรุณาสแกนหรือพิมพ์รหัสทรัพย์สินก่อนครับ');
            return;
        }

        const scanTime = scanTimeInput.value || getFormattedDateTime();
        const actionTime = getFormattedDateTime();
        const cabinet = cabinetSelect.value;

        // บันทึกข้อมูล (เพิ่ม id เพื่อให้ง่ายต่อการค้นหาและลบ)
        logs.unshift({ 
            id: Date.now(), // ใช้ timestamp เป็น unique ID ของรายการนั้นๆ
            asset: assetId, 
            action: actionType, 
            scanTime: scanTime,
            actionTime: actionTime,
            cabinet: cabinet 
        });
        localStorage.setItem('myAssetLogs', JSON.stringify(logs));
        
        renderLogs();
        
        assetInput.value = '';
        scanTimeInput.value = '';
        statusDiv.innerText = "บันทึกข้อมูลเรียบร้อย";
    }

    // ฟังก์ชันสำหรับลบรายการประวัติเฉพาะชิ้น
    function deleteLog(id) {
        if (confirm("คุณแน่ใจใช่ไหมว่าต้องการลบประวัติรายการนี้?")) {
            // กรองเอาตัวที่ ID ไม่ตรงออก (เหลือเฉพาะรายการที่ไม่ได้กดลบ)
            logs = logs.filter(log => log.id !== id);
            localStorage.setItem('myAssetLogs', JSON.stringify(logs));
            renderLogs();
        }
    }

    function renderLogs() {
        const logListElement = document.getElementById('logList');
        if (logs.length === 0) {
            logListElement.innerHTML = '<div style="color:#a0aec0; text-align:center; padding: 10px;">ยังไม่มีประวัติ</div>';
            return;
        }
        
        logListElement.innerHTML = logs.map(log => `
            <div class="log-item">
                <div class="log-left-content">
                    <div class="log-info">
                        <strong>${log.asset}</strong> 
                        <div class="cabinet-badge">📍 ${log.cabinet || 'ไม่ได้ระบุ'}</div>
                        <div class="time-info">
                            📸 สแกน: ${log.scanTime}<br>
                            ⚡ ทำรายการ: ${log.actionTime}
                        </div>
                    </div>
                </div>
                <div class="log-right-actions">
                    <div class="${log.action === 'หยิบออก' ? 'status-out' : 'status-in'}">${log.action}</div>
                    <button class="btn-delete" onclick="deleteLog(${log.id})">🗑️ ลบ</button>
                </div>
            </div>
        `).join('');
    }

    function exportToExcel() {
        if (logs.length === 0) {
            alert('ยังไม่มีข้อมูลประวัติให้ดาวน์โหลดครับ');
            return;
        }

        const dataForExcel = logs.map((log, index) => ({
            "ลำดับที่": logs.length - index,
            "วัน-เวลาที่สแกนสติกเกอร์": log.scanTime,
            "วัน-เวลาที่กดทำรายการ": log.actionTime,
            "รหัส / ชื่อทรัพย์สิน": log.asset,
            "ตู้เก็บของ / ตำแหน่ง": log.cabinet || 'ไม่ได้ระบุ',
            "สถานะรายการ": log.action
        }));

        const worksheet = XLSX.utils.json_to_sheet(dataForExcel);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "ประวัติยืม-คืน");

        const today = new Date().toISOString().slice(0,10);
        const filename = `Asset_Notebook_Log_${today}.xlsx`;

        XLSX.writeFile(workbook, filename);
    }
</script>

</body>
</html>
