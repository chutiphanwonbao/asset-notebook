<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ดึงฟอนต์ Itim จาก Google Fonts เข้ามาในเว็บ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <title>Asset Notebook (Cloud Sync & Full Features)</title>
    <!-- ไลบรารี OCR อ่านตัวอักษร -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- ไลบรารีสร้างไฟล์ Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Itim', cursive, sans-serif; background-color: #f5f7fb; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 {text-align: center; color: #2c3e50; margin-top: 0; font-style: normal;}
        .section { border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .section-title { font-weight: bold; margin-bottom: 10px; color: #4a5568; display: flex; justify-content: space-between; align-items: center; }
        .camera-box { position: relative; width: 100%; max-width: 400px; margin: 0 auto; background: #1a202c; border-radius: 8px; overflow: hidden; aspect-ratio: 4 / 3; display: flex; align-items: center; justify-content: center; }
        #video { width: 100%; height: 100%; object-fit: cover; display: none; }
        .camera-placeholder { color: #a0aec0; font-size: 14px; text-align: center; position: absolute; }
        .scan-region { position: absolute; top: 42.5%; left: 15%; width: 70%; height: 15%; border: 3px dashed #3182ce; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5); pointer-events: none; display: none; z-index: 10; }
        .scan-region::after { content: "เล็งตัวอักษรให้อยู่ในกรอบนี้"; position: absolute; bottom: -25px; left: 0; width: 100%; text-align: center; color: #fff; font-size: 12px; background: rgba(0,0,0,0.7); }
        .status-text { text-align: center; font-size: 14px; color: #718096; margin: 8px 0; }
        input, select { width: 100%; padding: 12px; border: 2px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-weight: bold; }
        input { text-align: center; color: #2b6cb0; font-size: 18px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #4a5568; font-size: 14px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-scan { background-color: #3182ce; color: white; width: 100%; margin-top: 10px; }
        .btn-checkout { background-color: #e53e3e; color: white; }
        .btn-checkin { background-color: #38a169; color: white; }
        .btn-excel { background-color: #107c41; color: white; font-size: 12px; padding: 6px 12px; border-radius: 4px; }
        .btn-delete { background-color: #fff; border: 1px solid #e53e3e; color: #e53e3e; padding: 6px 10px; font-size: 12px; border-radius: 4px; font-weight: normal; }
        .btn-delete:hover { background-color: #fff5f5; }
        .log-list { max-height: 280px; overflow-y: auto; margin-top: 10px; }
        .log-item { padding: 10px 12px; border-bottom: 1px solid #edf2f7; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .log-left-content { display: flex; align-items: center; gap: 12px; }
        .log-info { display: flex; flex-direction: column; }
        .time-info { color: #718096; font-size: 11px; margin-top: 4px; line-height: 1.4; }
        .cabinet-badge { background-color: #edf2f7; color: #4a5568; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; display: inline-block; margin-top: 4px; border: 1px solid #cbd5e0; width: fit-content; }
        .status-out { background-color: #fed7d7; color: #9b2c2c; padding: 4px 8px; border-radius: 4px; font-weight: bold; text-align: center; min-width: 60px; }
        .status-in { background-color: #c6f6d5; color: #22543d; padding: 4px 8px; border-radius: 4px; font-weight: bold; text-align: center; min-width: 60px; }
        .log-right-actions { display: flex; align-items: center; gap: 10px; }
        #canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 Asset Notebook (ระบบคลาวด์ซิงค์)</h2>
    
    <!-- 1. ส่วนกล้องสแกน -->
    <div class="section">
        <div class="section-title">📷 สแกนสติกเกอร์ทรัพย์สิน</div>
        <div class="camera-box">
            <div class="camera-placeholder" id="placeholderText">🔒 กล้องปิดอยู่ กดปุ่มด้านล่างเพื่อสแกน</div>
            <video id="video" autoplay playsinline></video>
            <div class="scan-region" id="scanRegion"></div>
        </div>
        <button class="btn-scan" id="scanBtn" onclick="startScanProcess()">📸 กดเพื่อสแกนอ่านคำ</button>
        <div class="status-text" id="status">สถานะ: รอการเชื่อมต่อ</div>
    </div>

    <!-- 2. ฟอร์มรายละเอียด -->
    <div class="section">
        <div class="section-title">🔄 ระบุรายละเอียดข้อมูล</div>
        <div class="form-group">
            <label for="assetId">รหัสทรัพย์สินที่สแกนได้</label>
            <input type="text" id="assetId" placeholder="ตัวอักษรจะโผล่ที่นี่">
            <input type="hidden" id="lastScanTime" value="">
        </div>
        <div class="form-group">
            <label for="cabinetLocation">📦 ตู้เก็บของที่ทำรายการ</label>
            <select id="cabinetLocation">
                <option value="ตู้ A">ตู้ A</option>
                <option value="ตู้ B">ตู้ B</option>
                <option value="ตู้ C">ตู้ C</option>
                <option value="ตู้ D">ตู้ D</option>

            </select>
        </div>
        <div class="btn-group">
            <button class="btn-checkout" onclick="handleAction('หยิบออก')">📤 หยิบออก</button>
            <button class="btn-checkin" onclick="handleAction('เก็บคืน')">📥 เก็บคืน</button>
        </div>
    </div>

    <!-- 3. รายการประวัติ -->
    <div class="section">
        <div class="section-title">
            <span>📜 ประวัติเรียลไทม์จาก Google Sheets</span>
            <button class="btn-excel" onclick="exportToExcel()">🟢 ดาวน์โหลดเป็น Excel</button>
        </div>
        <div class="log-list" id="logList">กำลังดึงประวัติจากระบบคลาวด์...</div>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    // ตั้งค่าลิงก์ปัจจุบันของคุณเรียบร้อยแล้วครับ
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwi5MA4zGdhH8HBXFAob6dteJui-MLsPrlaZvcw_FD_Y0rIC-6t3Ud1G7yPP7_sy0LvgA/exec";

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const assetInput = document.getElementById('assetId');
    const scanTimeInput = document.getElementById('lastScanTime');
    const cabinetSelect = document.getElementById('cabinetLocation');
    const placeholderText = document.getElementById('placeholderText');
    const scanRegion = document.getElementById('scanRegion');
    const scanBtn = document.getElementById('scanBtn');

    let currentStream = null;
    let logs = [];

    // ดึงข้อมูลประวัติจากคลาวด์ตอนเริ่มต้น
    fetchLogsFromCloud();

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
        .then(stream => { stream.getTracks().forEach(t => t.stop()); statusDiv.innerText = "สถานะ: เชื่อมต่อระบบกล้องสำเร็จ"; })
        .catch(err => { statusDiv.innerText = "เตือน: โหมดแสดงผลประวัติอย่างเดียว (ไม่ได้ต่อกล้อง)"; });

    function getFormattedDateTime() {
        const now = new Date();
        return now.toLocaleDateString('th-TH') + ' ' + now.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
    }

    async function startScanProcess() {
        statusDiv.innerText = "🔌 กำลังเปิดกล้อง...";
        scanBtn.disabled = true;
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
            video.srcObject = currentStream;
            video.style.display = "block";
            scanRegion.style.display = "block";
            placeholderText.style.display = "none";
            
            await new Promise(resolve => setTimeout(resolve, 1200));

            const ctx = canvas.getContext('2d');
            canvas.width = 500; canvas.height = 120;
            ctx.drawImage(video, (video.videoWidth - 500) / 2, (video.videoHeight - 120) / 2, 500, 120, 0, 0, 500, 120);

            stopCamera();
            statusDiv.innerText = "🧠 AI กำลังอ่านคำ...";
            
            const result = await Tesseract.recognize(canvas, 'eng');
            let cleanText = result.data.text.trim().replace(/[^a-zA-Z0-9-_ ]/g, '');
            
            if (cleanText) {
                assetInput.value = cleanText;
                scanTimeInput.value = getFormattedDateTime();
                statusDiv.innerText = "✅ สแกนคำสำเร็จ";
            } else {
                statusDiv.innerText = "❌ อ่านไม่ออก ลองใหม่อีกครั้งครับ";
            }
        } catch (err) {
            statusDiv.innerText = "ข้อผิดพลาดกล้อง: " + err.message;
            stopCamera();
        } finally {
            scanBtn.disabled = false;
        }
    }

    function stopCamera() {
        if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); currentStream = null; }
        video.srcObject = null; video.style.display = "none"; scanRegion.style.display = "none"; placeholderText.style.display = "block";
    }

    // ฟังก์ชันดึงประวัติล่าสุดจากคลาวด์ (ถอนจุดล็อกตรวจสอบคำว่า https ออกแล้ว)
    function fetchLogsFromCloud() {
        statusDiv.innerText = "⏳ กำลังซิงค์ประวัติกับคลาวด์...";
        fetch(GOOGLE_SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                logs = data;
                renderLogs();
                statusDiv.innerText = "✅ ซิงค์ข้อมูลคลาวด์ล่าสุดแล้ว";
            })
            .catch(err => {
                document.getElementById('logList').innerText = "ยังไม่สามารถดึงข้อมูลจากคลาวด์ได้ชั่วคราว (กรุณาลองกดทำรายการชิ้นแรกก่อนครับ)";
                statusDiv.innerText = "⚠️ รอการทำรายการชิ้นแรก";
            });
    }

    // ฟังก์ชันบันทึกข้อมูลยิงขึ้นคลาวด์ Google Sheets (ปลดล็อกปุ่มสมบูรณ์)
    function handleAction(actionType) {
        const assetId = assetInput.value.trim();
        if (!assetId) {
            alert('กรุณาสแกนรหัส หรือพิมพ์ระบุชื่อทรัพย์สินก่อนครับ');
            return;
        }

        statusDiv.innerText = "⚡ กำลังส่งบันทึกขึ้นระบบคลาวด์...";
        const payload = {
            id: Date.now(),
            asset: assetId,
            action: actionType,
            scanTime: scanTimeInput.value || getFormattedDateTime(),
            actionTime: getFormattedDateTime(),
            cabinet: cabinetSelect.value
        };

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(() => {
            statusDiv.innerText = "✅ บันทึกบนคลาวด์สำเร็จ!";
            assetInput.value = ''; scanTimeInput.value = '';
            // โดลดข้อมูลประวัติที่อัปเดตล่าสุดมาแสดงผล
            setTimeout(fetchLogsFromCloud, 1000);
        }).catch(err => {
            alert('บันทึกข้อมูลไม่สำเร็จ: ' + err.message);
        });
    }

    function deleteLog(index) {
        if (confirm("คุณแน่ใจใช่ไหมว่าต้องการลบประวัติรายการนี้ออกจากหน้านี้?")) {
            logs.splice(index, 1);
            renderLogs();
        }
    }

    function renderLogs() {
        const logListElement = document.getElementById('logList');
        if (!logs || logs.length === 0) {
            logListElement.innerHTML = '<div style="color:#a0aec0; text-align:center; padding: 10px;">ยังไม่มีประวัติในคลาวด์</div>';
            return;
        }
        logListElement.innerHTML = logs.map((log, index) => `
            <div class="log-item">
                <div class="log-left-content">
                    <div class="log-info">
                        <strong>${log.asset}</strong> 
                        <div class="cabinet-badge">📍 ${log.cabinet || 'ไม่ได้ระบุ'}</div>
                        <div class="time-info">📸 สแกน: ${log.scanTime}<br>⚡ ทำรายการ: ${log.actionTime}</div>
                    </div>
                </div>
                <div class="log-right-actions">
                    <div class="${log.action === 'หยิบออก' ? 'status-out' : 'status-in'}">${log.action}</div>
                    <button class="btn-delete" onclick="deleteLog(${index})">🗑️ ลบ</button>
                </div>
            </div>
        `).join('');
    }

    function exportToExcel() {
        if (logs.length === 0) {
            alert('ยังไม่มีข้อมูลประวัติให้ดาวน์โหลดครับ');
            return;
        }
        const dataForExcel = logs.map((log, index) => ({
            "ลำดับที่": logs.length - index,
            "วัน-เวลาที่สแกนสติกเกอร์": log.scanTime,
            "วัน-เวลาที่กดทำรายการ": log.actionTime,
            "รหัส / ชื่อทรัพย์สิน": log.asset,
            "ตู้เก็บของ / ตำแหน่ง": log.cabinet || 'ไม่ได้ระบุ',
            "สถานะรายการ": log.action
        }));
        const worksheet = XLSX.utils.json_to_sheet(dataForExcel);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "ประวัติยืม-คืน");
        const today = new Date().toISOString().slice(0,10);
        const filename = `Asset_Cloud_Log_${today}.xlsx`;
        XLSX.writeFile(workbook, filename);
    }
</script>
</body>
</html>
